name: Node CI Blueprint
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      package-manager:
        type: string
        default: "npm"
permissions:
  contents: read
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Install
        run: npm ci || npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: |
          if [ -f tsconfig.json ]; then npx --yes tsc --noEmit; else echo "skip"; fi
      - name: Test
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present
