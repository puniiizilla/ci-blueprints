name: Node CI Blueprint
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      package-manager:
        type: string
        default: "npm"
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - run: npm ci || npm install
      - run: npm run lint --if-present
      - name: Typecheck
        run: |
          if [ -f tsconfig.json ]; then npx --yes tsc --noEmit; else echo skip; fi
      - run: npm test --if-present
      - run: npm run build --if-present

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'
    steps:
      - run: echo "docker placeholder"
