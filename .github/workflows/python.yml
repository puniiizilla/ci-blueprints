name: Python CI Blueprint

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.12"

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]" || pip install -e .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install ruff pyright pytest

      - name: Lint (ruff)
        run: ruff check . || true

      - name: Typecheck (pyright)
        run: pyright || echo "pyright not configured — skipping"

      - name: Test (pytest)
        run: |
          if compgen -G "tests/*" > /dev/null || compgen -G "test_*.py" > /dev/null; then
            pytest -q
          else
            echo "no tests — skipping"
          fi

      - name: Build (if pyproject.toml)
        run: |
          if [ -f pyproject.toml ]; then
            pip install build
            python -m build --sdist --wheel
          fi

  docker:
    name: Docker Build + Push (ghcr.io)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to ghcr.io
        if: steps.check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
